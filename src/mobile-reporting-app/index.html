<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#184e77">
    <title>Gili's Daily Activity</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Gili Activity">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Parent report</p>
          <h1>Gili's Daily Activity</h1>
        </div>
        <button id="refreshButton" class="icon-button" type="button" title="Reload reports" aria-label="Reload reports">↻</button>
      </header>

      <section class="activity-section" aria-label="Gili activity report">
        <div class="section-heading">
          <h2>Browser activity</h2>
          <span id="activitySource">No activity report</span>
        </div>
        <div id="activityEmptyState" class="empty-state" hidden>No activity report is available yet.</div>
        <div id="activityReport" class="activity-report" hidden>
          <article class="activity-card highlight-card">
            <div class="activity-card-heading">
              <h3>Browser activity</h3>
              <strong id="browserTotalTime">0h 00m</strong>
            </div>
            <div id="browserHistoryList" class="activity-list"></div>
          </article>
          <article class="activity-card">
            <div class="activity-card-heading">
              <h3>Apps used</h3>
              <strong id="appsTotalTime">0h 00m</strong>
            </div>
            <div id="appsUsedList" class="activity-list"></div>
          </article>
        </div>
      </section>

      <section class="locker-section" aria-label="Locker timing log">
        <div class="section-heading">
          <h2>Locker timing</h2>
          <span id="dataSource">Sample data</span>
        </div>

        <section class="summary-strip" aria-label="Locker summary">
          <div>
            <span id="totalUsage" class="metric">0h 00m</span>
            <span class="label">unlocked time</span>
          </div>
          <div>
            <span id="totalLocks" class="metric">0</span>
            <span class="label">lock screens</span>
          </div>
          <div>
            <span id="reportDays" class="metric">0</span>
            <span class="label">days</span>
          </div>
        </section>

        <section class="timeline-section" aria-label="Daily locker timing">
          <div id="emptyState" class="empty-state" hidden>No locker timing data is available yet.</div>
          <div id="reportList" class="report-list"></div>
        </section>
      </section>

      <section class="import-panel" aria-label="Import report data">
        <label for="reportFile">Load locker report JSON</label>
        <input id="reportFile" type="file" accept="application/json,.json">
      </section>
    </main>

    <template id="dayTemplate">
      <article class="day-card">
        <div class="day-header">
          <div>
            <h3></h3>
            <p class="day-subtitle"></p>
          </div>
          <strong class="usage-pill"></strong>
        </div>
        <dl class="detail-grid">
          <div>
            <dt>Lock screens</dt>
            <dd data-field="totalLocks"></dd>
          </div>
          <div>
            <dt>Parent actions</dt>
            <dd data-field="parentActions"></dd>
          </div>
        </dl>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
