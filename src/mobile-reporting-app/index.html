<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#184e77">
    <title>Cultural Aspects Report</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Parent report</p>
          <h1>Cultural Aspects</h1>
        </div>
        <button id="refreshButton" class="icon-button" type="button" title="Reload sample report" aria-label="Reload report">↻</button>
      </header>

      <section class="summary-strip" aria-label="Report summary">
        <div>
          <span id="totalUsage" class="metric">0h 00m</span>
          <span class="label">usage logged</span>
        </div>
        <div>
          <span id="totalLocks" class="metric">0</span>
          <span class="label">lock screens</span>
        </div>
        <div>
          <span id="reportDays" class="metric">0</span>
          <span class="label">days</span>
        </div>
      </section>

      <section class="import-panel" aria-label="Import report data">
        <label for="reportFile">Load report JSON</label>
        <input id="reportFile" type="file" accept="application/json,.json">
      </section>

      <section class="timeline-section" aria-label="Daily reports">
        <div class="section-heading">
          <h2>Daily activity</h2>
          <span id="dataSource">Sample data</span>
        </div>
        <div id="emptyState" class="empty-state" hidden>No report data is available yet.</div>
        <div id="reportList" class="report-list"></div>
      </section>
    </main>

    <template id="dayTemplate">
      <article class="day-card">
        <div class="day-header">
          <div>
            <h3></h3>
            <p class="day-subtitle"></p>
          </div>
          <strong class="usage-pill"></strong>
        </div>
        <dl class="detail-grid">
          <div>
            <dt>Regular locks</dt>
            <dd data-field="regularLockAppearances"></dd>
          </div>
          <div>
            <dt>Daily limit locks</dt>
            <dd data-field="dailyLimitLockAppearances"></dd>
          </div>
          <div>
            <dt>Parent extra time</dt>
            <dd data-field="parentExtraSecondsGranted"></dd>
          </div>
          <div>
            <dt>Test locks</dt>
            <dd data-field="testLockAppearances"></dd>
          </div>
        </dl>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
